pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

rootProject.name = 'CngEditorExample'

// In a yarn-workspaces monorepo, dependencies are hoisted to the repo root
// node_modules. The paths below resolve to <repoRoot>/node_modules/...
apply from: file("../../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
applyNativeModulesSettingsGradle(settings)

include ':app'
includeBuild('../../../node_modules/@react-native/gradle-plugin')
